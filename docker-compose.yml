# REX-BOT-AI Docker Compose
# Full stack: REX core + Redis + Ollama + ChromaDB
# Usage: docker compose up -d

services:
  # ---- Infrastructure ----

  # SECURITY: Set REDIS_PASSWORD in .env before first run
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      sh -c '
      if [ -z "$REDIS_PASSWORD" ]; then
        echo "ERROR: REDIS_PASSWORD is not set. Set it in .env before starting." >&2;
        exit 1;
      fi;
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "$REDIS_PASSWORD"
      --bind 0.0.0.0'
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rex-internal
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:0.6  # Pin to minor version, not :latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - rex-internal
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NOTELEMETRY: "1"
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  chromadb:
    image: chromadb/chroma:0.6.3  # Pin to specific version
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - rex-internal
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "TRUE"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- REX Services ----

  rex:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REX_MODE: ${REX_MODE:-basic}
      REX_LOG_LEVEL: ${REX_LOG_LEVEL:-info}
      REX_DATA_DIR: /etc/rex-bot-ai
      REX_DASHBOARD_PORT: "8443"
      REX_DASHBOARD_HOST: "0.0.0.0"
      REX_REDIS_URL: redis://:${REDIS_PASSWORD}@localhost:6379
      REX_OLLAMA_URL: http://localhost:11434
      REX_CHROMA_URL: http://localhost:8000
      REX_NETWORK_INTERFACE: ${REX_NETWORK_INTERFACE:-auto}
      REX_SCAN_INTERVAL: ${REX_SCAN_INTERVAL:-300}
      # Notifications (optional)
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-}
      MATRIX_HOMESERVER: ${MATRIX_HOMESERVER:-}
      MATRIX_ROOM_ID: ${MATRIX_ROOM_ID:-}
      MATRIX_ACCESS_TOKEN: ${MATRIX_ACCESS_TOKEN:-}
      # Privacy
      OLLAMA_NOTELEMETRY: "1"
      REX_FEDERATION_ENABLED: ${REX_FEDERATION_ENABLED:-false}
      REX_ADMIN_PASSWORD: ${REX_ADMIN_PASSWORD:-}
    # Host network required for packet capture and firewall management.
    # This means REX reaches Redis/Ollama/ChromaDB via localhost (they
    # publish their ports to the host via the ports: directive below).
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - rex-data:/etc/rex-bot-ai
      - rex-logs:/var/log/rex-bot-ai
    # NOTE: no ports: directive — network_mode: host exposes all bound ports directly

volumes:
  redis-data:
    driver: local
  ollama-models:
    driver: local
  chroma-data:
    driver: local
  rex-data:
    driver: local
  rex-logs:
    driver: local

networks:
  rex-internal:
    driver: bridge
    internal: true
