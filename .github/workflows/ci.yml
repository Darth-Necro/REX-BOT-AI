name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check rex/ tests/
      - run: ruff format --check rex/ tests/

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/ || true

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for shell=True
        run: |
          if grep -rn 'shell=True' rex/ --include='*.py' | grep -v '__pycache__' | grep -v '#' | grep -v '"""' | grep -v 'NEVER' | grep -v 'not'; then
            echo "FAIL: shell=True found in code"
            exit 1
          fi
          echo "PASS: No shell=True in executable code"
      - name: Check localhost-only LLM
        run: |
          grep -q 'ALLOWED_HOSTS' rex/brain/llm.py && echo "PASS: LLM localhost enforcement present"

  test-python:
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pip install -e .
      - run: python -m pytest tests/ -v --tb=short --cov=rex --cov-report=term-missing
        env:
          REX_DATA_DIR: /tmp/rex-test

  build-frontend:
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-python, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t rex-bot-ai:test .

  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: find rex/ -name '*.py' -exec python -m py_compile {} \;
